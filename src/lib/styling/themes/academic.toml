# Academic paper theme — Times body, justified paragraphs, 1-inch
# margins, centered h1, generous spacing.
inherits = "default"

[page]
margins = { top = 25.4, right = 25.4, bottom = 25.4, left = 25.4 }

[defaults]
font_family = "Times"
font_size_pt = 11.0
line_height = 1.8
text_align = "justify"

[paragraph]
margin_after_pt = 6.0

[headings.h1]
font_size_pt = 18.0
text_align = "center"
margin_before_pt = 12.0
margin_after_pt = 8.0
[headings.h2]
font_size_pt = 14.0
margin_before_pt = 10.0
margin_after_pt = 6.0
[headings.h3]
font_size_pt = 12.0
font_style = "italic"

[blockquote]
font_style = "italic"
background_color = "#FFFFFF"
indent_pt = 25.0

[link]
text_color = "#000000"
underline = true

# Conservative palette: low saturation, restrained tints.
[admonition]
text_color = "#000000"
padding = { top = 6.0, right = 10.0, bottom = 6.0, left = 12.0 }

[admonition.note]
accent_color = "#455A64"
background_color = "#ECEFF1"

[admonition.info]
accent_color = "#00695C"
background_color = "#E0F2F1"

[admonition.tip]
accent_color = "#2E7D32"
background_color = "#E8F5E9"

[admonition.warning]
accent_color = "#BF360C"
background_color = "#FFEAE1"

[admonition.danger]
accent_color = "#B71C1C"
background_color = "#FFEBEE"

[admonition.generic]
accent_color = "#424242"
background_color = "#EEEEEE"
