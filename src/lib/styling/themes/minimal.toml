# Minimal theme — single sans-serif, no borders, no fills, generous
# whitespace. Pleasant for reading; nothing decorative.
inherits = "default"

[page]
margins = { top = 30.0, right = 30.0, bottom = 30.0, left = 30.0 }

[defaults]
font_size_pt = 10.5
line_height = 1.55

[code_block]
background_color = "#FFFFFF"
text_color = "#000000"
padding = 0.0

[code_inline]
background_color = "#FFFFFF"

[blockquote]
background_color = "#FFFFFF"
[blockquote.border]
left = { width_pt = 1.0, color = "#000000", style = "solid" }

[table.border.all]
width_pt = 0.0
color = "#FFFFFF"
style = "solid"

[link]
underline = true

# Monochrome: black accent borders + icons on white. Per-kind
# backgrounds explicitly overridden to white so we don't inherit
# the default theme's tinted palette.
[admonition]
text_color = "#000000"
background_color = "#FFFFFF"
padding = { top = 4.0, right = 8.0, bottom = 4.0, left = 10.0 }

[admonition.note]
accent_color = "#000000"
background_color = "#FFFFFF"

[admonition.info]
accent_color = "#000000"
background_color = "#FFFFFF"

[admonition.tip]
accent_color = "#000000"
background_color = "#FFFFFF"

[admonition.warning]
accent_color = "#000000"
background_color = "#FFFFFF"

[admonition.danger]
accent_color = "#000000"
background_color = "#FFFFFF"

[admonition.generic]
accent_color = "#000000"
background_color = "#FFFFFF"
